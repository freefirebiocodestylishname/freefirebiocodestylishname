// Convert a single character to a font
function convertChar(char, fontSet){
    let index = char.toUpperCase().charCodeAt(0) - 65;
    if(index >= 0 && index < 26){
        return fontSet[index];
    } else {
        return char; // non A-Z characters stay the same
    }
}

// Load fonts letter by letter
function loadFonts(){
    let text = document.getElementById("fontInput").value || "FREE FIRE";
    fontBox.innerHTML = "";

    fonts.forEach(fset => {
        // create a row for this font style
        let row = document.createElement("div");
        row.style.display = "flex";
        row.style.justifyContent = "center";
        row.style.flexWrap = "wrap";
        row.style.marginBottom = "10px";

        for(let char of text){
            let converted = convertChar(char, fset);
            let d = document.createElement("div");
            d.className = "box";
            d.innerText = converted;
            d.style.margin = "3px";
            d.onclick = () => copy(converted);
            row.appendChild(d);
        }

        fontBox.appendChild(row);
    });
}

document.getElementById("fontInput").addEventListener("input", loadFonts);
